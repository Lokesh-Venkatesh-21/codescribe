name: CodeScribe PR Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Run CodeScribe
        uses: ./
        with:
          post-comment: true
          post-review: false
          auto-approve: false
          fail-on-risk: false
          risk-threshold: 75
          llm-provider: auto
          write-artifacts: false
          annotate-code: true
          commit-documentation: true
          documentation-file: documentation.md
